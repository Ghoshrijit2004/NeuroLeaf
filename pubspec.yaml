name: neuroleaf
description: A new Flutter project

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  http: ^1.2.1
  tflite_flutter: ^0.10.4
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.0
  flutter_facebook_auth: ^7.0.0
  intl_phone_field: ^3.2.0
  geolocator: ^13.0.1
